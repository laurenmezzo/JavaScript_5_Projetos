<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Contador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Compre Ovo de Páscoa de Morango do Amor</h1>
        <div id="inAlt">
            <img src="img/ovoMDA.jpg" alt="">
            <div>
                <h2>Ovo de Páscoa de Morango do Amor</h2>
                <p>O melhor ovo de páscoa que você vai comer!</p>
                <span>R$67.00</span>
            </div>
        </div>
        <aside>
            <h3>Adicionar ao carrinho</h3>
            <button id="minus" class="inactive">-</button>
            <button id="numCount">0</button>
            <button id="plus" class="active">+</button>
            <p>Seu total é:</p>
            <span id="priceCount">R$:0.00</span>
        </aside>
    </main>
    <script src="script.js"></script>
</body>
</html>
